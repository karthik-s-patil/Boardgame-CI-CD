apiVersion: apps/v1
kind: Deployment
metadata:
  name: boardgame-deployment
  labels:
    app: boardgame-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: boardgame-deployment
  template:
    metadata:
      labels:
        app: boardgame-deployment
    spec:
      containers:
      - name: boardgame
        image: kspkarthik/board-img:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8083

---
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  type: NodePort
  selector:
    app: boardgame-deployment
  ports:
  - port: 8083
    targetPort: 8083
    nodePort: 30007
